<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>EBLG Dashboard</title>

    <!-- Leaflet CSS -->
    <link 
        rel="stylesheet" 
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Ton CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet JS -->
    <script 
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <!-- PolylineDecorator (OBLIGATOIRE AVANT app.js) -->
    <script 
        src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.polylinedecorator/1.7.0/leaflet.polylineDecorator.min.js">
    </script>
</head>



<body>

     <!-- SIDEBAR -->
    <div id="sidebar">
        <h2>EBLG Dashboard</h2>

        <div class="sb-section">
            <h3>METAR</h3>
            <div id="metar"></div>
        </div>

        <div class="sb-section">
            <h3>TAF</h3>
            <div id="taf"></div>
        </div>

        <div class="sb-section">
            <h3>Piste active</h3>
            <div id="runway-panel"></div>
        </div>

        <div class="sb-section">
            <h3>État des services</h3>
            <div id="status-panel"></div>
        </div>
        
        <div id="sono-panel">
            <h3>Sonomètres actifs</h3>
            <div id="sono-list"></div>
        </div>
        
        <div id="sono-panel" class="collapsed">
            <div id="sono-header">
                <span>Sonomètres</span>
                <button id="sono-toggle">⯈</button>
            </div>

            <div id="sono-stats"></div>
            <canvas id="sono-chart" width="220" height="60"></canvas>
            <div id="sono-list"></div>
        </div>

        <div class="sb-section">
            <h3>FIDS</h3>
            <div id="fids"></div>
        </div>
    </div>
    
<button id="reset-map">Reset carte</button>

    <!-- CONTENU PRINCIPAL -->
    <div id="main">
        <h2>Carte</h2>
        <div id="map"></div>
        
    </div>
    <!-- PANNEAU D’ÉTAT GLOBAL -->
    <div id="status-panel"></div>

    <!-- PANNEAU PISTE ACTIVE + CROSSWIND -->
    <div id="runway-panel"></div>

    <h2>METAR</h2>
    <div id="metar"></div>

    <h2>TAF</h2>
    <div id="taf"></div>

    <h2>FIDS</h2>
    <div id="fids"></div>

    <h2>Carte</h2>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script 
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <!-- Ton script principal -->
    <script src="app.js?v=52"></script>


</body>
</html>
